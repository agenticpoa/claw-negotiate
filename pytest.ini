[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers --showlocals
markers =
    integration: tests that hit real external services (Anthropic, sshsign, upstream negotiate repo); opt-in via RUN_INTEGRATION=1
    real_wait: opt out of conftest._no_real_investor_wait so the test exercises the actual _investor_wait_for_founder_streaming poll loop with mocked time/clients
